core:
  primary_model: ollama/qwen2.5:32b
  upgrade_target: ollama/qwen2.5:32b
  local_required: true

fallbacks:
  - anthropic/claude-sonnet-4-6
  - openai-codex/gpt-5.3-codex
  - xai/grok-4
  - google/gemini-2.0-flash
  - minimax-portal/MiniMax-M2.5
  - venice/llama-3.3-70b
  - openrouter/auto

routing:
  local_inference:
    match:
      - type: chat
      - type: routine
      - type: low_complexity
    target: core.primary_model

  ane_training:
    match:
      - type: embedding_train
      - type: tiny_finetune
      - type: kernel_benchmark
      - type: matrix_multiply
    routing_logic: node_registry_select
    preferred_capabilities: [ane, train]
    fallback_to: ane_worker
    min_nodes_required: 1

  rdma_allreduce:
    match:
      - type: all_reduce
      - type: high_throughput_comms
    routing_logic: node_registry_select
    preferred_capabilities: [rdma, allreduce]
    fallback_to: directreduce_service
    min_nodes_required: 1

  hosted_heavy:
    match:
      - type: long_context
      - type: multi_tool_complex
      - type: high_reasoning
    target: fallbacks[0]

  failover:
    on_local_error: true
    on_timeout_ms: 12000
    fallback_chain: fallbacks

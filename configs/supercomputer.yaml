# Star Platinum Cluster — full cluster configuration
# Source of truth for exo, OpenClaw routing, and orchestration.
# Last updated: 2026-04-16

cluster:
  name: star-platinum
  owner: ravenx
  version: "2.0"        # bumped for dual-brain + CUDA sidecar
  topology: dual-brain-ring-plus-sidecar

# ─── Brains ──────────────────────────────────────────────────────────────────
brains:
  primary:              # Brain A — always-on orchestration
    node: m3-ultra
    responsibilities:
      - openclaw-runtime
      - scheduler
      - routing
      - session-state
      - memory
      - skills
      - small-model-inference     # < 8B models run here directly
  secondary:            # Brain B — heavy compute
    node: m4-max-128
    responsibilities:
      - heavy-inference
      - training
      - long-context
      - prefill
    invoked_when:
      - model.params_b >= 8
      - task in [training, fine-tune, long-context-generate]

# ─── Nodes ───────────────────────────────────────────────────────────────────
nodes:

  m3-ultra:
    status: active
    chassis: mac-studio-2025
    chip: apple-m3-ultra
    cpu_cores: 28                 # 20P + 8E
    gpu_cores: 60
    ane_cores: 32
    ane_tflops_fp16: 38
    gpu_tflops_fp16: 27
    memory_gb: 96
    mem_bandwidth_gbps: 819
    storage_tb: 1
    tb_ports: { tb5: 6 }
    ethernet: 10gbe
    headless: true
    tailscale_host: mac-studio.beardie-ph.ts.net
    role: brain-a
    device_classes: [ane, metal, cpu]
    ring_member: true
    ring_neighbors: [m4-max-128, m3-24]
    sidecar_host_for: [rtx-3090]

  m4-max-128:
    status: active
    chassis: mbp-14
    chip: apple-m4-max
    cpu_cores: 16
    gpu_cores: 40
    ane_cores: 16
    ane_tflops_fp16: 19
    gpu_tflops_fp16: 54
    memory_gb: 128
    storage_tb: 1
    tb_ports: { tb5: 3 }
    headless: true
    role: brain-b
    device_classes: [ane, metal, cpu]
    ring_member: true
    ring_neighbors: [m3-ultra, m1-max-64]

  m1-max-64:
    status: active
    chassis: mbp-16-recycled
    chip: apple-m1-max
    cpu_cores: 10
    gpu_cores: 32
    ane_cores: 16
    ane_tflops_fp16: 11
    gpu_tflops_fp16: 13
    memory_gb: 64
    storage_tb: 1
    tb_ports: { tb4: 3 }
    ethernet: 1gbe
    headless: false
    role: worker
    device_classes: [ane, metal, cpu]
    ring_member: true
    ring_neighbors: [m4-max-128, m3-24]

  m3-24:
    status: active
    chassis: mbp-14
    chip: apple-m3
    cpu_cores: 8
    gpu_cores: 10
    ane_cores: 16
    ane_tflops_fp16: 9
    gpu_tflops_fp16: 7
    memory_gb: 24
    storage_tb: 2
    tb_ports: { tb4: 2 }
    role: worker
    device_classes: [ane, metal, cpu]
    ring_member: true
    ring_neighbors: [m1-max-64, m3-ultra]

  rtx-3090:
    status: active
    chassis: sonnet-breakaway-850-t5
    gpu: nvidia-rtx-3090
    vram_gb: 24
    cuda_cores: 10496
    tflops_fp16_tensor: 71
    connection: { type: tb5, attached_to: m3-ultra }
    psu_watts: 850
    gpu_tdp_watts: 350
    driver: tinycorp-egpu
    ring_member: false
    device_classes: [cuda]
    supported_formats: [gguf, awq, gptq, safetensors-pytorch]
    backends: [vllm, exllama-v2, llama-cpp, transformers]

  beast:
    status: active
    chassis: mac-pro-2013
    cpu: intel-xeon-e5-1680-v2
    cpu_cores: 8
    memory_gb: 64
    storage_tb: 1
    ethernet: 10gbe
    tb_ports: { tb3: 4 }        # Not wired into the RDMA ring
    os: linux
    ring_member: false
    device_classes: [cpu]
    role: file-server
    services: [docker, nfs, backups, rdma-core-reference]

  m2-air:
    status: active
    chassis: mbp-air-2022
    chip: apple-m2
    cpu_cores: 10
    gpu_cores: 10
    ane_cores: 16
    memory_gb: 16
    ring_member: false
    device_classes: [ane, metal, cpu]
    role: remote-access
    notes: Tailscale SSH + OpenClaw client

# ─── Retired ─────────────────────────────────────────────────────────────────
retired:
  - { node: m1-pro,   reason: sold-for-cuda-expansion, date: 2026-04 }
  - { node: m2-pro,   reason: sold-for-cuda-expansion, date: 2026-04 }
  - { node: imac-pro, reason: reassigned, date: 2026-04 }

# ─── Device-class routing ────────────────────────────────────────────────────
device_classes:

  ane:
    nodes: [m3-ultra, m4-max-128, m1-max-64, m3-24]
    total_tflops_fp16: 85
    workloads: [prefill, all-reduce, small-model-inference, embedding]
    qos: [real-time, background]

  metal:
    nodes: [m3-ultra, m4-max-128, m1-max-64, m3-24]
    total_tflops_fp16: 108
    workloads: [mlx-inference, lora-fine-tune]

  cuda:
    nodes: [rtx-3090]
    total_vram_gb: 24
    total_tflops_fp16_tensor: 71
    workloads: [vllm-serving, flash-attn-3, exllama, qlora]
    preferred_model_formats: [gguf, awq, gptq, safetensors-pytorch]

  cpu:
    nodes: [beast, m3-ultra, m4-max-128, m1-max-64, m3-24, m2-air]
    workloads: [storage, embedding-legacy, rerank, serving-orchestration]

# ─── Totals ──────────────────────────────────────────────────────────────────
totals:
  apple_ring_nodes: 4
  cuda_nodes: 1
  unified_memory_gb: 312        # 96+128+64+24
  cuda_vram_gb: 24
  ane_tflops_fp16: 85
  apple_gpu_tflops_fp16: 108
  cuda_tflops_fp16_tensor: 71
  combined_tflops_fp16: 264

# ─── TurboQuant + Grove ──────────────────────────────────────────────────────
# See configs/turboquant_config.json for the live config.
# This block declares participation per-node.
turboquant:
  enabled_on: [m3-ultra, m4-max-128, m1-max-64, m3-24]
  kv_cache_dir: ~/.turboquant/kv-cache
  bits: 4
  fp16_sink_size: 128
  compress_after: 128

grove:
  enabled_on: [m3-ultra, m4-max-128, m1-max-64, m3-24]
  tb4_nodes: [m4-max-128, m1-max-64, m3-24]    # connected via TB
  wifi_nodes: []                                # none currently — M2 Air is off-ring
  tb4_params: { chunk_size: 8192, topk: 256, use_dct: false, H: 50 }
  wifi_params: { chunk_size: 4096, topk: 64, use_dct: true, H: 200 }
